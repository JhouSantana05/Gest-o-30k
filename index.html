<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão 30k Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #10b981; --primary-dark: #059669; --danger: #ef4444; 
            --warning: #f59e0b; --dark: #0f172a; --slate: #64748b; --light: #f8fafc; 
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--light); margin: 0; padding: 0; color: var(--dark); overflow-x: hidden; }

        /* TELA DE LOGIN */
        #tela-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { background: white; width: 100%; max-width: 350px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .login-card i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .login-card h2 { margin-bottom: 20px; color: var(--dark); }

        /* APP CONTENT (Escondido antes do login) */
        #app-content { display: none; }

        /* Estilos do Dashboard (Mantidos e Melhorados) */
        .dashboard-fixo { 
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); 
            color: white; padding: 25px 20px; text-align: center; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }
        .reserva-valor { margin: 5px 0; color: var(--warning); font-size: 2.2rem; font-weight: 800; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card strong { display: block; font-size: 1rem; margin-top: 4px; }
        .barra-bg { background: rgba(255,255,255,0.1); height: 12px; border-radius: 6px; overflow: hidden; margin: 8px 0; }
        #barra-progresso { background: linear-gradient(90deg, var(--primary), #34d399); height: 100%; width: 0%; transition: width 1.5s; }

        .nav-tabs { display: flex; background: #fff; position: sticky; top: 180px; z-index: 999; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .nav-tabs button { flex: 1; padding: 16px; border: none; background: none; font-weight: 700; color: var(--slate); cursor: pointer; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f0fdf4; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--slate); }
        .input-group input, .input-group select { width: 100%; padding: 14px 14px 14px 42px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 1rem; background: #f8fafc; }

        .btn-main { background: var(--primary); color: white; border: none; font-weight: 700; padding: 16px; border-radius: 10px; width: 100%; cursor: pointer; transition: 0.2s; }
        .item-transacao { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 12px; background: #fff; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .item-transacao.saida { border-left: 5px solid var(--danger); }
        .item-transacao.entrada { border-left: 5px solid var(--primary); }
        .item-transacao.reserva { border-left: 5px solid var(--warning); }
        
        .btn-acao { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: var(--slate); cursor: pointer; margin-left: 6px; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; z-index: 10000; display: none; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-card">
            <i class="fa-solid fa-shield-halved"></i>
            <h2>Acesso Restrito</h2>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <select id="login-usuario">
                    <option value="">Selecione quem é...</option>
                    <option value="Jhones">Jhones</option>
                    <option value="Tatiane">Tatiane</option>
                </select>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-senha" placeholder="Senha de 4 dígitos" inputmode="numeric" maxlength="4">
            </div>
            <button onclick="verificarLogin()" class="btn-main">ENTRAR NO APP</button>
            <p id="erro-login" style="color: var(--danger); font-size: 0.8rem; margin-top: 10px; display: none;">Usuário ou senha incorretos!</p>
        </div>
    </div>

    <div id="app-content">
        <div id="toast">Ação realizada! ✅</div>

        <div class="dashboard-fixo">
            <small><i class="fa-solid fa-bullseye"></i> Reserva Meta 30k</small>
            <div id="saldo-reserva" class="reserva-valor">R$ 0,00</div>
            <div class="stats-grid">
                <div class="stat-card"><small>SALDO LIVRE</small><strong id="saldo-disponivel">R$ 0,00</strong></div>
                <div class="stat-card"><small>GASTOS MÊS</small><strong id="total-saidas" style="color: #fda4af;">R$ 0,00</strong></div>
            </div>
            <div class="meta-box">
                <div class="barra-bg"><div id="barra-progresso"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700;">
                    <span id="texto-meta">PROGRESSO: 0%</span>
                    <span>META: R$ 30.000</span>
                </div>
            </div>
        </div>

        <div class="nav-tabs">
            <button id="tab-add" class="active" onclick="mudarPagina('add')"><i class="fa-solid fa-plus-circle"></i> NOVO</button>
            <button id="tab-rel" onclick="mudarPagina('rel')"><i class="fa-solid fa-chart-pie"></i> ANÁLISE</button>
        </div>

        <div class="container">
            <div id="page-add" class="page active">
                <div class="card">
                    <form id="form-financeiro">
                        <input type="hidden" id="edit-id">
                        <div class="input-group"><i class="fa-solid fa-wallet"></i><input type="number" id="valor" placeholder="Quanto? R$" step="0.01" required></div>
                        <div class="input-group"><i class="fa-solid fa-list"></i>
                            <select id="tipo" onchange="atualizarCategorias()" required>
                                <option value="">Tipo de Movimentação...</option>
                                <option value="saida">Gasto (Saída)</option>
                                <option value="entrada">Ganho (Entrada)</option>
                                <option value="reserva">Reserva (Meta 30k)</option>
                            </select>
                        </div>
                        <div id="container-categoria" class="input-group" style="display:none;"><i class="fa-solid fa-tag"></i><select id="categoria" onchange="atualizarSubCategorias()"></select></div>
                        <div id="container-subcategoria" class="input-group" style="display:none;"><i class="fa-solid fa-circle-info"></i><select id="subcategoria" onchange="toggleOutros()"></select></div>
                        <div id="container-outros" class="input-group" style="display:none;"><i class="fa-solid fa-pen"></i><input type="text" id="desc-outros" placeholder="O que exatamente?"></div>
                        <div class="input-group"><i class="fa-solid fa-user-circle"></i><input type="text" id="usuario-display" readonly style="background: #e2e8f0; color: #64748b;"></div>
                        <div class="input-group"><i class="fa-solid fa-calendar-day"></i><input type="date" id="data" required></div>
                        <button type="submit" id="btn-salvar" class="btn-main">CONFIRMAR LANÇAMENTO</button>
                        <button type="button" id="btn-cancelar" onclick="resetForm()" style="display:none; background:#cbd5e1; margin-top:8px; border-radius:10px; padding:12px; border:none; width:100%;">CANCELAR</button>
                    </form>
                </div>
                <div id="lista-recente"></div>
            </div>

            <div id="page-rel" class="page">
                <div class="card">
                    <input type="month" id="filtro-mes" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px;">
                    <button onclick="processarDados()" class="btn-main" style="background: var(--dark)">FILTRAR MÊS</button>
                </div>
                <div id="conteudo-relatorio">
                    <div class="card"><canvas id="chartEntradas"></canvas></div>
                    <div class="card"><canvas id="chartSaidas"></canvas></div>
                    <div id="lista-periodo"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDiNnVgOrHM73l_i02Ev6oj0EjWMz9TDzg", authDomain: "app-finenceiro-jhones.firebaseapp.com", projectId: "app-finenceiro-jhones", storageBucket: "app-finenceiro-jhones.firebasestorage.app", messagingSenderId: "42364946159", appId: "1:42364946159:web:be7e2cc6a0dbb0c4493d1a" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "transacoes");
        let localData = [];
        let chartE = null; let chartS = null;
        let logadoComo = "";

        // FUNÇÃO DE LOGIN
        window.verificarLogin = () => {
            const user = document.getElementById('login-usuario').value;
            const pass = document.getElementById('login-senha').value;
            
            const credenciais = { "Jhones": "1234", "Tatiane": "4321" };

            if(credenciais[user] === pass) {
                logadoComo = user;
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('usuario-display').value = "Logado como: " + user;
                processarDados();
            } else {
                document.getElementById('erro-login').style.display = 'block';
            }
        };

        const catsSaida = {
            "🛒 Mercado": ["Compras do Mês", "Higiene", "Hortifruti", "Outros"],
            "🏠 Contas Fixas": ["Aluguel", "Condomínio", "Luz", "Água", "Internet", "Gás", "Streaming", "IPTU/IPVA", "Outros"],
            "✂️ Papelaria": ["Materiais", "Equipamentos", "Embalagens", "Outros"],
            "🚗 Carro": ["Combustível", "Manutenção", "Seguro", "Outros"],
            "🍕 Lazer": ["Restaurante", "Cinema", "Viagem", "Outros"],
            "💊 Saúde": ["Farmácia", "Consulta", "Exames", "Outros"],
            "⚙️ Outros": ["Outros"]
        };
        const catsEntrada = { "💵 Rendimentos": ["Salário", "Benefício", "Eventos", "Extras", "Vendas Papelaria", "Reembolso", "Outros"] };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2500);
        };

        window.atualizarCategorias = () => {
            const tipo = document.getElementById('tipo').value;
            const selectCat = document.getElementById('categoria');
            selectCat.innerHTML = '<option value="">Selecione Categoria...</option>';
            document.getElementById('container-categoria').style.display = (tipo && tipo !== 'reserva') ? 'block' : 'none';
            document.getElementById('container-subcategoria').style.display = 'none';
            if(tipo && tipo !== 'reserva'){
                const lista = tipo === 'saida' ? catsSaida : catsEntrada;
                Object.keys(lista).forEach(c => { selectCat.innerHTML += `<option value="${c}">${c}</option>`; });
            }
        };

        window.atualizarSubCategorias = () => {
            const cat = document.getElementById('categoria').value;
            const tipo = document.getElementById('tipo').value;
            const selectSub = document.getElementById('subcategoria');
            selectSub.innerHTML = '<option value="">Selecione Detalhe...</option>';
            document.getElementById('container-subcategoria').style.display = cat ? 'block' : 'none';
            if(cat){
                const lista = tipo === 'saida' ? catsSaida[cat] : (catsEntrada[cat] || []);
                lista.forEach(s => { selectSub.innerHTML += `<option value="${s}">${s}</option>`; });
            }
        };

        window.toggleOutros = () => {
            const sub = document.getElementById('subcategoria').value;
            document.getElementById('container-outros').style.display = (sub === 'Outros') ? 'block' : 'none';
        };

        window.mudarPagina = (p) => {
            document.querySelectorAll('.page, .nav-tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('tab-'+p).classList.add('active');
        };

        document.getElementById('form-financeiro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const sub = document.getElementById('subcategoria').value;
            const dados = {
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value || "Reserva",
                subcategoria: sub === 'Outros' ? document.getElementById('desc-outros').value : (sub || "Aporte Meta"),
                usuario: logadoComo,
                data: document.getElementById('data').value,
                timestamp: new Date().getTime()
            };
            id ? await updateDoc(doc(db, "transacoes", id), dados) : await addDoc(colRef, dados);
            showToast("Sucesso!"); resetForm();
        });

        window.excluirItem = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "transacoes", id)); };

        window.editarItem = (id) => {
            const t = localData.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('valor').value = t.valor;
            document.getElementById('tipo').value = t.tipo;
            atualizarCategorias();
            if(t.tipo !== 'reserva') document.getElementById('categoria').value = t.categoria;
            atualizarSubCategorias();
            document.getElementById('subcategoria').value = t.subcategoria;
            document.getElementById('data').value = t.data;
            document.getElementById('btn-salvar').innerText = "SALVAR ALTERAÇÕES";
            document.getElementById('btn-cancelar').style.display = "block";
            mudarPagina('add');
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('form-financeiro').reset();
            document.getElementById('data').valueAsDate = new Date();
            document.getElementById('usuario-display').value = "Logado como: " + logadoComo;
            document.getElementById('btn-salvar').innerText = "CONFIRMAR LANÇAMENTO";
            document.getElementById('btn-cancelar').style.display = "none";
        };

        onSnapshot(query(colRef, orderBy("timestamp", "desc")), (snap) => {
            localData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            processarDados();
        });

        window.processarDados = () => {
            const rT = localData.filter(t => t.tipo === 'reserva').reduce((a, b) => a + b.valor, 0);
            const eT = localData.filter(t => t.tipo === 'entrada').reduce((a, b) => a + b.valor, 0);
            const sT = localData.filter(t => t.tipo === 'saida').reduce((a, b) => a + b.valor, 0);
            
            document.getElementById('saldo-reserva').innerText = `R$ ${rT.toLocaleString('pt-BR', {minFractionDigits:2})}`;
            document.getElementById('saldo-disponivel').innerText = `R$ ${(eT - sT - rT).toLocaleString('pt-BR', {minFractionDigits:2})}`;
            document.getElementById('total-saidas').innerText = `R$ ${sT.toLocaleString('pt-BR', {minFractionDigits:2})}`;
            document.getElementById('barra-progresso').style.width = Math.min((rT/30000)*100, 100) + '%';
            document.getElementById('texto-meta').innerText = `PROGRESSO: ${((rT/30000)*100).toFixed(1)}%`;

            const mes = document.getElementById('filtro-mes').value;
            const dM = localData.filter(t => t.data.startsWith(mes));
            if(dM.length > 0) updateCharts(dM);
            document.getElementById('lista-recente').innerHTML = renderHTML(localData.slice(0, 10));
            document.getElementById('lista-periodo').innerHTML = renderHTML(dM);
        };

        function updateCharts(dados) {
            const prep = (tipo) => {
                const r = {}; dados.filter(t => t.tipo === tipo).forEach(t => { r[t.subcategoria] = (r[t.subcategoria] || 0) + t.valor; });
                return { l: Object.keys(r), v: Object.values(r) };
            };
            const dE = prep('entrada'); const dS = prep('saida');
            if(chartE) chartE.destroy(); if(chartS) chartS.destroy();
            chartE = new Chart(document.getElementById('chartEntradas'), { type:'bar', data:{ labels:dE.l, datasets:[{label:'Ganhos', data:dE.v, backgroundColor:'#10b981'}] } });
            chartS = new Chart(document.getElementById('chartSaidas'), { type:'bar', data:{ labels:dS.l, datasets:[{label:'Gastos', data:dS.v, backgroundColor:'#ef4444'}] } });
        }

        function renderHTML(lista) {
            return lista.map(t => `
                <div class="item-transacao ${t.tipo}">
                    <div><strong>${t.subcategoria}</strong><br><small>${t.usuario} • ${t.data}</small></div>
                    <div style="text-align:right"><strong>R$ ${t.valor.toLocaleString('pt-BR')}</strong><br>
                        <button class="btn-acao" onclick="editarItem('${t.id}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-acao" onclick="excluirItem('${t.id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('data').valueAsDate = new Date();
        document.getElementById('filtro-mes').value = new Date().toISOString().substring(0, 7);
    </script>
</body>
</html>
