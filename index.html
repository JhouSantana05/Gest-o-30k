<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão 30k - Jhou & Tati</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); margin: 0; padding: 0; color: var(--dark); }
        .dashboard-fixo { background: linear-gradient(135deg, var(--dark), #34495e); color: white; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; }
        .meta-box { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; margin-top: 10px; border: 1px solid rgba(46, 204, 113, 0.3); }
        .barra-bg { background: rgba(255,255,255,0.2); height: 10px; border-radius: 5px; overflow: hidden; margin: 5px 0; }
        #barra-progresso { background: var(--primary); height: 100%; width: 0%; transition: width 1s; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: var(--dark); opacity: 0.5; cursor: pointer; }
        .nav-tabs button.active { opacity: 1; border-bottom: 3px solid var(--primary); color: var(--primary); }
        .container { padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .input-group { position: relative; margin-bottom: 10px; }
        .input-group i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #95a5a6; }
        .input-group input, .input-group select { padding-left: 40px !important; width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .btn-main { background-color: var(--primary); color: white; border: none; font-weight: bold; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; }
        .btn-update { background-color: var(--dark); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .btn-csv { background-color: #3498db; color: white; border: none; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        .item-transacao { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #eee; }
        .item-transacao.saida { border-left: 4px solid var(--danger); padding-left: 10px; }
        .item-transacao.entrada { border-left: 4px solid var(--primary); padding-left: 10px; }
        .item-transacao.reserva { border-left: 4px solid var(--warning); padding-left: 10px; }
        .btn-acao { width: 32px; height: 32px; background: #f0f2f5; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="dashboard-fixo">
        <small>RESERVA PARA MUDANÇA (META 30K)</small>
        <h2 id="saldo-reserva" style="margin: 2px 0; color: var(--warning); font-size: 1.8rem;">R$ 0,00</h2>
        <div class="stats-grid">
            <div class="stat-card"><small>SALDO LIVRE</small><strong id="saldo-disponivel">R$ 0,00</strong></div>
            <div class="stat-card"><small>TOTAL SAÍDAS</small><strong id="total-saidas" style="color: #ff7675;">R$ 0,00</strong></div>
        </div>
        <div class="meta-box">
            <div class="barra-bg"><div id="barra-progresso"></div></div>
            <small id="texto-meta">Progresso: 0%</small>
        </div>
    </div>

    <div class="nav-tabs">
        <button id="tab-add" class="active" onclick="mudarPagina('add')">LANÇAR</button>
        <button id="tab-rel" onclick="mudarPagina('rel')">RELATÓRIOS</button>
    </div>

    <div class="container">
        <div id="page-add" class="page active">
            <div class="card">
                <form id="form-financeiro">
                    <input type="hidden" id="edit-id">
                    <div class="input-group"><i class="fa-solid fa-dollar-sign"></i><input type="number" id="valor" placeholder="Valor R$" step="0.01" required></div>
                    <div class="input-group"><i class="fa-solid fa-arrows-left-right"></i>
                        <select id="tipo" onchange="atualizarCategorias()" required>
                            <option value="">Selecionar Tipo...</option>
                            <option value="saida">Gasto (Saída)</option>
                            <option value="entrada">Ganho (Entrada)</option>
                            <option value="reserva">Reserva (Meta 30k)</option>
                        </select>
                    </div>
                    <div id="container-categoria" class="input-group" style="display:none;"><i class="fa-solid fa-tags"></i><select id="categoria" onchange="atualizarSubCategorias()"></select></div>
                    <div id="container-subcategoria" class="input-group" style="display:none;"><i class="fa-solid fa-list-check"></i><select id="subcategoria" onchange="toggleOutros()"></select></div>
                    <div id="container-outros" class="input-group" style="display:none;"><i class="fa-solid fa-pen"></i><input type="text" id="desc-outros" placeholder="Descreva o que é..."></div>
                    <div class="input-group"><i class="fa-solid fa-user"></i><select id="usuario" required><option value="">Selecionar Usuário...</option><option value="Jhones">Jhones</option><option value="Tatiane">Tatiane</option></select></div>
                    <div class="input-group"><i class="fa-solid fa-calendar"></i><input type="date" id="data" required></div>
                    <button type="submit" id="btn-salvar" class="btn-main">SALVAR LANÇAMENTO</button>
                    <button type="button" id="btn-cancelar" onclick="resetForm()" style="display:none; background:#95a5a6; color:white; margin-top:5px; border-radius:8px; padding:10px; border:none; width:100%;">CANCELAR EDIÇÃO</button>
                </form>
            </div>
            <div class="card"><h3>Últimos Lançamentos</h3><div id="lista-recente"></div></div>
        </div>

        <div id="page-rel" class="page">
            <div class="card">
                <h3>Filtro Mensal</h3>
                <div class="input-group"><i class="fa-solid fa-calendar-check"></i><input type="month" id="filtro-mes"></div>
                <button onclick="processarDados()" class="btn-update"><i class="fa-solid fa-rotate"></i> ATUALIZAR DASHBOARD</button>
                <div id="container-csv" style="display:none;"><button onclick="exportarCSV()" class="btn-csv"><i class="fa-solid fa-file-excel"></i> BAIXAR EXCEL</button></div>
            </div>
            <div id="conteudo-relatorio">
                <div class="card"><h4 style="color:var(--primary)">Ganhos por Subcategoria</h4><canvas id="chartEntradas"></canvas></div>
                <div class="card"><h4 style="color:var(--danger)">Gastos por Subcategoria</h4><canvas id="chartSaidas"></canvas></div>
                <div class="card"><h3>Lista do Período</h3><div id="lista-periodo"></div></div>
            </div>
            <div id="aviso-vazio" class="card" style="display:none; text-align:center; color:#95a5a6; padding:30px;"><i class="fa-solid fa-face-frown fa-2x"></i><br>Nenhuma movimentação neste mês.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDiNnVgOrHM73l_i02Ev6oj0EjWMz9TDzg", authDomain: "app-finenceiro-jhones.firebaseapp.com", projectId: "app-finenceiro-jhones", storageBucket: "app-finenceiro-jhones.firebasestorage.app", messagingSenderId: "42364946159", appId: "1:42364946159:web:be7e2cc6a0dbb0c4493d1a" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "transacoes");
        let localData = [];
        let chartE = null;
        let chartS = null;

        const catsSaida = {
            "🛒 Mercado": ["Compras do Mês", "Higiene", "Hortifruti", "Outros"],
            "🏠 Contas Fixas": ["Aluguel", "Condomínio", "Luz", "Água", "Internet", "Gás", "Streaming", "IPTU/IPVA", "Outros"],
            "✂️ Papelaria": ["Materiais", "Equipamentos", "Embalagens", "Outros"],
            "🚗 Carro": ["Combustível", "Manutenção", "Seguro", "Outros"],
            "🍕 Lazer": ["Restaurante", "Cinema", "Viagem", "Outros"],
            "💊 Saúde": ["Farmácia", "Consulta", "Exames", "Outros"],
            "⚙️ Outros": ["Outros"]
        };
        const catsEntrada = { "💵 Rendimentos": ["Salário", "Benefício", "Eventos", "Extras", "Vendas Papelaria", "Reembolso", "Outros"] };

        window.atualizarCategorias = () => {
            const tipo = document.getElementById('tipo').value;
            const selectCat = document.getElementById('categoria');
            selectCat.innerHTML = '<option value="">Selecione Categoria...</option>';
            document.getElementById('container-categoria').style.display = (tipo && tipo !== 'reserva') ? 'block' : 'none';
            document.getElementById('container-subcategoria').style.display = 'none';
            if(tipo && tipo !== 'reserva'){
                const lista = tipo === 'saida' ? catsSaida : catsEntrada;
                Object.keys(lista).forEach(c => { selectCat.innerHTML += `<option value="${c}">${c}</option>`; });
            }
        };

        window.atualizarSubCategorias = () => {
            const cat = document.getElementById('categoria').value;
            const tipo = document.getElementById('tipo').value;
            const selectSub = document.getElementById('subcategoria');
            selectSub.innerHTML = '<option value="">Selecione Detalhe...</option>';
            document.getElementById('container-subcategoria').style.display = cat ? 'block' : 'none';
            if(cat){
                const lista = tipo === 'saida' ? catsSaida[cat] : (catsEntrada[cat] || []);
                lista.forEach(s => { selectSub.innerHTML += `<option value="${s}">${s}</option>`; });
            }
        };

        window.toggleOutros = () => {
            const sub = document.getElementById('subcategoria').value;
            document.getElementById('container-outros').style.display = (sub === 'Outros') ? 'block' : 'none';
        };

        window.mudarPagina = (p) => {
            document.querySelectorAll('.page, .nav-tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('tab-'+p).classList.add('active');
            processarDados(); 
        };

        document.getElementById('form-financeiro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const sub = document.getElementById('subcategoria').value;
            const dados = {
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value || "Reserva",
                subcategoria: sub === 'Outros' ? document.getElementById('desc-outros').value : (sub || "Aporte Meta"),
                usuario: document.getElementById('usuario').value,
                data: document.getElementById('data').value,
                timestamp: new Date().getTime()
            };
            id ? await updateDoc(doc(db, "transacoes", id), dados) : await addDoc(colRef, dados);
            resetForm();
        });

        window.excluirItem = async (id) => { if(confirm("Apagar permanentemente?")) await deleteDoc(doc(db, "transacoes", id)); };

        window.editarItem = (id) => {
            const t = localData.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('valor').value = t.valor;
            document.getElementById('tipo').value = t.tipo;
            atualizarCategorias();
            if(t.tipo !== 'reserva') document.getElementById('categoria').value = t.categoria;
            atualizarSubCategorias();
            document.getElementById('subcategoria').value = t.subcategoria;
            if(!Array.from(document.getElementById('subcategoria').options).some(opt => opt.value === t.subcategoria) && t.tipo !== 'reserva'){
                document.getElementById('subcategoria').value = "Outros";
                document.getElementById('container-outros').style.display = 'block';
                document.getElementById('desc-outros').value = t.subcategoria;
            }
            document.getElementById('usuario').value = t.usuario;
            document.getElementById('data').value = t.data;
            document.getElementById('btn-salvar').innerText = "ATUALIZAR";
            document.getElementById('btn-cancelar').style.display = "block";
            mudarPagina('add');
            window.scrollTo(0,0);
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('form-financeiro').reset();
            document.getElementById('data').valueAsDate = new Date();
            document.getElementById('btn-salvar').innerText = "SALVAR LANÇAMENTO";
            document.getElementById('btn-cancelar').style.display = "none";
            document.getElementById('container-categoria').style.display = 'none';
            document.getElementById('container-subcategoria').style.display = 'none';
            document.getElementById('container-outros').style.display = 'none';
        };

        onSnapshot(query(colRef, orderBy("timestamp", "desc")), (snap) => {
            localData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            processarDados();
        });

        window.processarDados = () => {
            const reservaTotal = localData.filter(t => t.tipo === 'reserva').reduce((a, b) => a + b.valor, 0);
            const entradasTotal = localData.filter(t => t.tipo === 'entrada').reduce((a, b) => a + b.valor, 0);
            const saidasTotal = localData.filter(t => t.tipo === 'saida').reduce((a, b) => a + b.valor, 0);

            // LOGICA: O Saldo Disponível é Entradas - Gastos - Dinheiro já reservado
            const saldoDisponivel = entradasTotal - saidasTotal - reservaTotal;

            document.getElementById('saldo-reserva').innerText = `R$ ${reservaTotal.toLocaleString('pt-BR')}`;
            document.getElementById('saldo-disponivel').innerText = `R$ ${saldoDisponivel.toLocaleString('pt-BR')}`;
            document.getElementById('total-saidas').innerText = `R$ ${saidasTotal.toLocaleString('pt-BR')}`;
            
            const perc = Math.min((reservaTotal/30000)*100, 100);
            document.getElementById('barra-progresso').style.width = perc + '%';
            document.getElementById('texto-meta').innerText = `Progresso Meta: ${perc.toFixed(1)}%`;

            const mes = document.getElementById('filtro-mes').value;
            const dadosMes = localData.filter(t => t.data.startsWith(mes));
            
            if(dadosMes.length > 0){
                document.getElementById('conteudo-relatorio').style.display = 'block';
                document.getElementById('aviso-vazio').style.display = 'none';
                document.getElementById('container-csv').style.display = 'block';
                updateCharts(dadosMes);
                document.getElementById('lista-periodo').innerHTML = renderHTML(dadosMes);
            } else {
                document.getElementById('conteudo-relatorio').style.display = 'none';
                document.getElementById('aviso-vazio').style.display = 'block';
                document.getElementById('container-csv').style.display = 'none';
            }
            document.getElementById('lista-recente').innerHTML = renderHTML(localData.slice(0, 10));
        };

        function updateCharts(dados) {
            const prepararSub = (tipo) => {
                const res = {};
                dados.filter(t => t.tipo === tipo).forEach(t => {
                    const label = t.subcategoria || "Outros";
                    res[label] = (res[label] || 0) + t.valor;
                });
                return { labels: Object.keys(res), values: Object.values(res) };
            };

            const dEntrada = prepararSub('entrada');
            const dSaida = prepararSub('saida');

            if(chartE) chartE.destroy();
            if(chartS) chartS.destroy();

            chartE = new Chart(document.getElementById('chartEntradas'), {
                type: 'bar',
                data: { labels: dEntrada.labels, datasets: [{ data: dEntrada.values, backgroundColor: '#2ecc71', borderRadius: 5 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });

            chartS = new Chart(document.getElementById('chartSaidas'), {
                type: 'bar',
                data: { labels: dSaida.labels, datasets: [{ data: dSaida.values, backgroundColor: '#e74c3c', borderRadius: 5 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        window.exportarCSV = () => {
            const mes = document.getElementById('filtro-mes').value;
            const dados = localData.filter(t => t.data.startsWith(mes));
            let csv = "Data;Categoria;Detalhe;Usuario;Valor;Tipo\n";
            dados.forEach(t => { csv += `${t.data};${t.categoria};${t.subcategoria};${t.usuario};${t.valor.toFixed(2)};${t.tipo}\n`; });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Gestao_Financeira_${mes}.csv`;
            link.click();
        };

        function renderHTML(lista) {
            return lista.map(t => `
                <div class="item-transacao ${t.tipo}">
                    <div>
                        <strong>${t.subcategoria}</strong> <small>(${t.categoria})</small>
                        <span style="display:block; font-size:0.7rem; color:#95a5a6;">${t.usuario} • ${new Date(t.data + 'T00:00:00').toLocaleDateString('pt-BR')}</span>
                    </div>
                    <div style="text-align:right">
                        <strong>R$ ${t.valor.toLocaleString('pt-BR')}</strong>
                        <div style="margin-top:5px;">
                            <button class="btn-acao" onclick="editarItem('${t.id}')"><i class="fa-solid fa-pencil"></i></button>
                            <button class="btn-acao" onclick="excluirItem('${t.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('data').valueAsDate = new Date();
        document.getElementById('filtro-mes').value = new Date().toISOString().substring(0, 7);
    </script>
</body>
</html>
