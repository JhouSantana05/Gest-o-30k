<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão 30k Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #10b981; --primary-dark: #059669; --danger: #ef4444; 
            --warning: #f59e0b; --dark: #0f172a; --slate: #64748b; --light: #f8fafc; 
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--light); margin: 0; padding: 0; color: var(--dark); line-height: 1.5; }
        
        /* Dashboard Header */
        .dashboard-fixo { 
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%); 
            color: white; padding: 25px 20px; text-align: center; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }
        .dashboard-fixo small { text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8; font-weight: 600; font-size: 0.65rem; }
        .reserva-valor { margin: 5px 0; color: var(--warning); font-size: 2.2rem; font-weight: 800; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card strong { display: block; font-size: 1rem; margin-top: 4px; }
        
        /* Progress Bar */
        .meta-box { margin-top: 20px; }
        .barra-bg { background: rgba(255,255,255,0.1); height: 12px; border-radius: 6px; overflow: hidden; margin: 8px 0; border: 1px solid rgba(255,255,255,0.1); }
        #barra-progresso { background: linear-gradient(90deg, var(--primary), #34d399); height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Tabs */
        .nav-tabs { display: flex; background: #fff; position: sticky; top: 180px; z-index: 999; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .nav-tabs button { flex: 1; padding: 16px; border: none; background: none; font-weight: 700; color: var(--slate); font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f0fdf4; }

        /* Content */
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Forms */
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.06); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .card h3 { margin-top: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--slate); font-size: 0.9rem; }
        .input-group input, .input-group select { 
            width: 100%; padding: 14px 14px 14px 42px; border-radius: 10px; border: 1px solid #e2e8f0; 
            font-size: 1rem; transition: 0.3s; background: #f8fafc;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        /* Buttons */
        .btn-main { background: var(--primary); color: white; border: none; font-weight: 700; padding: 16px; border-radius: 10px; width: 100%; font-size: 1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-main:active { transform: scale(0.98); }
        .btn-update { background: var(--dark); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* List Items */
        .item-transacao { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 12px; background: #fff; margin-bottom: 10px; border: 1px solid #f1f5f9; transition: 0.2s; }
        .item-transacao.saida { border-left: 5px solid var(--danger); }
        .item-transacao.entrada { border-left: 5px solid var(--primary); }
        .item-transacao.reserva { border-left: 5px solid var(--warning); }
        .btn-acao { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: var(--slate); cursor: pointer; margin-left: 6px; transition: 0.2s; }
        .btn-acao:hover { background: #f1f5f9; color: var(--dark); }

        /* Toast Notification */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; z-index: 2000; display: none; box-shadow: 0 10px 15px rgba(0,0,0,0.2); animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast">Ação realizada! ✅</div>

    <div class="dashboard-fixo">
        <small><i class="fa-solid fa-bullseye"></i> Reserva Meta 30k</small>
        <div id="saldo-reserva" class="reserva-valor">R$ 0,00</div>
        <div class="stats-grid">
            <div class="stat-card"><small>SALDO LIVRE</small><strong id="saldo-disponivel">R$ 0,00</strong></div>
            <div class="stat-card"><small>GASTOS MÊS</small><strong id="total-saidas" style="color: #fda4af;">R$ 0,00</strong></div>
        </div>
        <div class="meta-box">
            <div class="barra-bg"><div id="barra-progresso"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 700;">
                <span id="texto-meta">PROGRESSO: 0%</span>
                <span>META: R$ 30.000</span>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <button id="tab-add" class="active" onclick="mudarPagina('add')"><i class="fa-solid fa-plus-circle"></i> NOVO</button>
        <button id="tab-rel" onclick="mudarPagina('rel')"><i class="fa-solid fa-chart-pie"></i> ANÁLISE</button>
    </div>

    <div class="container">
        <div id="page-add" class="page active">
            <div class="card">
                <form id="form-financeiro">
                    <input type="hidden" id="edit-id">
                    <div class="input-group"><i class="fa-solid fa-wallet"></i><input type="number" id="valor" placeholder="Quanto? R$" step="0.01" required></div>
                    <div class="input-group"><i class="fa-solid fa-list"></i>
                        <select id="tipo" onchange="atualizarCategorias()" required>
                            <option value="">Tipo de Movimentação...</option>
                            <option value="saida">Gasto (Saída)</option>
                            <option value="entrada">Ganho (Entrada)</option>
                            <option value="reserva">Reserva (Meta 30k)</option>
                        </select>
                    </div>
                    <div id="container-categoria" class="input-group" style="display:none;"><i class="fa-solid fa-tag"></i><select id="categoria" onchange="atualizarSubCategorias()"></select></div>
                    <div id="container-subcategoria" class="input-group" style="display:none;"><i class="fa-solid fa-circle-info"></i><select id="subcategoria" onchange="toggleOutros()"></select></div>
                    <div id="container-outros" class="input-group" style="display:none;"><i class="fa-solid fa-pen"></i><input type="text" id="desc-outros" placeholder="O que exatamente?"></div>
                    <div class="input-group"><i class="fa-solid fa-user-circle"></i><select id="usuario" required><option value="">Quem lançou?</option><option value="Jhones">Jhones</option><option value="Tatiane">Tatiane</option></select></div>
                    <div class="input-group"><i class="fa-solid fa-calendar-day"></i><input type="date" id="data" required></div>
                    <button type="submit" id="btn-salvar" class="btn-main">CONFIRMAR LANÇAMENTO</button>
                    <button type="button" id="btn-cancelar" onclick="resetForm()" style="display:none; background:#cbd5e1; color:var(--dark); margin-top:8px; border-radius:10px; padding:12px; border:none; width:100%; font-weight:700;">CANCELAR EDIÇÃO</button>
                </form>
            </div>
            <h3 style="padding-left: 5px;"><i class="fa-solid fa-clock-rotate-left"></i> Atividades Recentes</h3>
            <div id="lista-recente"></div>
        </div>

        <div id="page-rel" class="page">
            <div class="card">
                <h3><i class="fa-solid fa-filter"></i> Filtrar Período</h3>
                <div class="input-group"><i class="fa-solid fa-calendar-check"></i><input type="month" id="filtro-mes"></div>
                <button onclick="processarDados(); showToast('Dados atualizados!')" class="btn-update"><i class="fa-solid fa-arrows-rotate"></i> ATUALIZAR VISÃO</button>
                <div id="container-csv" style="display:none;"><button onclick="exportarCSV()" style="background:#3b82f6; color:white; border:none; padding:12px; border-radius:10px; width:100%; margin-top:10px; font-weight:700;"><i class="fa-solid fa-file-excel"></i> EXPORTAR PLANILHA</button></div>
            </div>
            <div id="conteudo-relatorio">
                <div class="card"><h3><i class="fa-solid fa-chart-column" style="color:var(--primary)"></i> Ganhos</h3><canvas id="chartEntradas"></canvas></div>
                <div class="card"><h3><i class="fa-solid fa-chart-column" style="color:var(--danger)"></i> Gastos</h3><canvas id="chartSaidas"></canvas></div>
                <h3><i class="fa-solid fa-list-ul"></i> Detalhamento do Mês</h3>
                <div id="lista-periodo"></div>
            </div>
            <div id="aviso-vazio" class="card" style="display:none; text-align:center; color:var(--slate); padding:40px;"><i class="fa-solid fa-folder-open fa-3x" style="opacity:0.2"></i><br><br>Nenhum dado encontrado para este mês.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDiNnVgOrHM73l_i02Ev6oj0EjWMz9TDzg", authDomain: "app-finenceiro-jhones.firebaseapp.com", projectId: "app-finenceiro-jhones", storageBucket: "app-finenceiro-jhones.firebasestorage.app", messagingSenderId: "42364946159", appId: "1:42364946159:web:be7e2cc6a0dbb0c4493d1a" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "transacoes");
        let localData = [];
        let chartE = null;
        let chartS = null;

        const catsSaida = {
            "🛒 Mercado": ["Compras do Mês", "Higiene", "Hortifruti", "Outros"],
            "🏠 Contas Fixas": ["Aluguel", "Condomínio", "Luz", "Água", "Internet", "Gás", "Streaming", "IPTU/IPVA", "Outros"],
            "✂️ Papelaria": ["Materiais", "Equipamentos", "Embalagens", "Outros"],
            "🚗 Carro": ["Combustível", "Manutenção", "Seguro", "Outros"],
            "🍕 Lazer": ["Restaurante", "Cinema", "Viagem", "Outros"],
            "💊 Saúde": ["Farmácia", "Consulta", "Exames", "Outros"],
            "⚙️ Outros": ["Outros"]
        };
        const catsEntrada = { "💵 Rendimentos": ["Salário", "Benefício", "Eventos", "Extras", "Vendas Papelaria", "Reembolso", "Outros"] };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2500);
        };

        window.atualizarCategorias = () => {
            const tipo = document.getElementById('tipo').value;
            const selectCat = document.getElementById('categoria');
            selectCat.innerHTML = '<option value="">Selecione Categoria...</option>';
            document.getElementById('container-categoria').style.display = (tipo && tipo !== 'reserva') ? 'block' : 'none';
            document.getElementById('container-subcategoria').style.display = 'none';
            if(tipo && tipo !== 'reserva'){
                const lista = tipo === 'saida' ? catsSaida : catsEntrada;
                Object.keys(lista).forEach(c => { selectCat.innerHTML += `<option value="${c}">${c}</option>`; });
            }
        };

        window.atualizarSubCategorias = () => {
            const cat = document.getElementById('categoria').value;
            const tipo = document.getElementById('tipo').value;
            const selectSub = document.getElementById('subcategoria');
            selectSub.innerHTML = '<option value="">Selecione Detalhe...</option>';
            document.getElementById('container-subcategoria').style.display = cat ? 'block' : 'none';
            if(cat){
                const lista = tipo === 'saida' ? catsSaida[cat] : (catsEntrada[cat] || []);
                lista.forEach(s => { selectSub.innerHTML += `<option value="${s}">${s}</option>`; });
            }
        };

        window.toggleOutros = () => {
            const sub = document.getElementById('subcategoria').value;
            document.getElementById('container-outros').style.display = (sub === 'Outros') ? 'block' : 'none';
        };

        window.mudarPagina = (p) => {
            document.querySelectorAll('.page, .nav-tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('tab-'+p).classList.add('active');
            processarDados(); 
        };

        document.getElementById('form-financeiro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const sub = document.getElementById('subcategoria').value;
            const dados = {
                valor: parseFloat(document.getElementById('valor').value),
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value || "Reserva",
                subcategoria: sub === 'Outros' ? document.getElementById('desc-outros').value : (sub || "Aporte Meta"),
                usuario: document.getElementById('usuario').value,
                data: document.getElementById('data').value,
                timestamp: new Date().getTime()
            };
            try {
                id ? await updateDoc(doc(db, "transacoes", id), dados) : await addDoc(colRef, dados);
                showToast(id ? "Atualizado com sucesso!" : "Lançado com sucesso!");
                resetForm();
            } catch (err) { alert("Erro ao salvar: " + err); }
        });

        window.excluirItem = async (id) => { 
            if(confirm("Tem certeza que deseja apagar?")) {
                await deleteDoc(doc(db, "transacoes", id));
                showToast("Item removido!");
            }
        };

        window.editarItem = (id) => {
            const t = localData.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('valor').value = t.valor;
            document.getElementById('tipo').value = t.tipo;
            atualizarCategorias();
            if(t.tipo !== 'reserva') document.getElementById('categoria').value = t.categoria;
            atualizarSubCategorias();
            document.getElementById('subcategoria').value = t.subcategoria;
            if(!Array.from(document.getElementById('subcategoria').options).some(opt => opt.value === t.subcategoria) && t.tipo !== 'reserva'){
                document.getElementById('subcategoria').value = "Outros";
                document.getElementById('container-outros').style.display = 'block';
                document.getElementById('desc-outros').value = t.subcategoria;
            }
            document.getElementById('usuario').value = t.usuario;
            document.getElementById('data').value = t.data;
            document.getElementById('btn-salvar').innerText = "SALVAR ALTERAÇÕES";
            document.getElementById('btn-cancelar').style.display = "block";
            mudarPagina('add');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('form-financeiro').reset();
            document.getElementById('data').valueAsDate = new Date();
            document.getElementById('btn-salvar').innerText = "CONFIRMAR LANÇAMENTO";
            document.getElementById('btn-cancelar').style.display = "none";
            document.getElementById('container-categoria').style.display = 'none';
            document.getElementById('container-subcategoria').style.display = 'none';
            document.getElementById('container-outros').style.display = 'none';
        };

        onSnapshot(query(colRef, orderBy("timestamp", "desc")), (snap) => {
            localData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            processarDados();
        });

        window.processarDados = () => {
            const reservaTotal = localData.filter(t => t.tipo === 'reserva').reduce((a, b) => a + b.valor, 0);
            const entradasTotal = localData.filter(t => t.tipo === 'entrada').reduce((a, b) => a + b.valor, 0);
            const saidasTotal = localData.filter(t => t.tipo === 'saida').reduce((a, b) => a + b.valor, 0);
            const saldoDisponivel = entradasTotal - saidasTotal - reservaTotal;

            document.getElementById('saldo-reserva').innerText = `R$ ${reservaTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('saldo-disponivel').innerText = `R$ ${saldoDisponivel.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-saidas').innerText = `R$ ${saidasTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            const perc = Math.min((reservaTotal/30000)*100, 100);
            document.getElementById('barra-progresso').style.width = perc + '%';
            document.getElementById('texto-meta').innerText = `PROGRESSO: ${perc.toFixed(1)}%`;

            const mes = document.getElementById('filtro-mes').value;
            const dadosMes = localData.filter(t => t.data.startsWith(mes));
            
            if(dadosMes.length > 0){
                document.getElementById('conteudo-relatorio').style.display = 'block';
                document.getElementById('aviso-vazio').style.display = 'none';
                document.getElementById('container-csv').style.display = 'block';
                updateCharts(dadosMes);
                document.getElementById('lista-periodo').innerHTML = renderHTML(dadosMes);
            } else {
                document.getElementById('conteudo-relatorio').style.display = 'none';
                document.getElementById('aviso-vazio').style.display = 'block';
                document.getElementById('container-csv').style.display = 'none';
            }
            document.getElementById('lista-recente').innerHTML = renderHTML(localData.slice(0, 10));
        };

        function updateCharts(dados) {
            const prepararSub = (tipo) => {
                const res = {};
                dados.filter(t => t.tipo === tipo).forEach(t => {
                    const label = t.subcategoria || "Outros";
                    res[label] = (res[label] || 0) + t.valor;
                });
                return { labels: Object.keys(res), values: Object.values(res) };
            };

            const dEntrada = prepararSub('entrada');
            const dSaida = prepararSub('saida');

            if(chartE) chartE.destroy();
            if(chartS) chartS.destroy();

            const chartConfig = (labels, values, color) => ({
                type: 'bar',
                data: { labels, datasets: [{ data: values, backgroundColor: color + 'CC', borderColor: color, borderWidth: 2, borderRadius: 8 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { display: false }, beginAtZero: true } } }
            });

            chartE = new Chart(document.getElementById('chartEntradas'), chartConfig(dEntrada.labels, dEntrada.values, '#10b981'));
            chartS = new Chart(document.getElementById('chartSaidas'), chartConfig(dSaida.labels, dSaida.values, '#ef4444'));
        }

        window.exportarCSV = () => {
            const mes = document.getElementById('filtro-mes').value;
            const dados = localData.filter(t => t.data.startsWith(mes));
            let csv = "Data;Categoria;Detalhe;Usuario;Valor;Tipo\n";
            dados.forEach(t => { csv += `${t.data};${t.categoria};${t.subcategoria};${t.usuario};${t.valor.toFixed(2)};${t.tipo}\n`; });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Relatorio_${mes}.csv`;
            link.click();
        };

        function renderHTML(lista) {
            return lista.map(t => `
                <div class="item-transacao ${t.tipo}">
                    <div style="flex: 1;">
                        <div style="font-weight: 700; color: var(--dark);">${t.subcategoria}</div>
                        <div style="font-size: 0.75rem; color: var(--slate); font-weight: 500;">${t.usuario} • ${new Date(t.data + 'T00:00:00').toLocaleDateString('pt-BR')}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight: 800; color: var(--dark); font-size: 1rem;">R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                        <div style="margin-top:8px; display: flex; justify-content: flex-end;">
                            <button class="btn-acao" onclick="editarItem('${t.id}')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-acao" onclick="excluirItem('${t.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('data').valueAsDate = new Date();
        document.getElementById('filtro-mes').value = new Date().toISOString().substring(0, 7);
    </script>
</body>
</html>
